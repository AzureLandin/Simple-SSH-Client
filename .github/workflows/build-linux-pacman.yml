name: Build Linux pacman (Arch)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-linux-pacman:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Linux packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package Arch pacman (x86_64)
        run: npx electron-builder --linux pacman --x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NodeShell-linux-pacman-x86_64
          path: |
            release/*.pkg.tar.zst
          if-no-files-found: error
