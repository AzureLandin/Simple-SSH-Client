name: Build macOS arm64

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-mac-arm64:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package macOS arm64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NodeShell-2.0.0-mac-arm64
          path: |
            release/*.dmg
            release/*-mac.zip
            release/*.blockmap
          if-no-files-found: error
